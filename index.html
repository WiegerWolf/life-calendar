<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Life in Weeks</title>
    <meta name="description" content="A life visualized — every square is one week">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>

    <!-- Floating header -->
    <header class="hud">
      <div class="hud-left">
        <span class="hud-age" id="hud-age"></span>
        <span class="hud-detail" id="hud-detail"></span>
      </div>
      <button class="hud-btn" id="legend-toggle" aria-label="Toggle legend">Phases</button>
    </header>

    <!-- Legend drawer -->
    <aside class="legend-drawer" id="legend-drawer" hidden>
      <div class="legend-inner" id="legend-inner"></div>
    </aside>

    <!-- The grid -->
    <div class="grid-viewport" id="grid-viewport">
      <div class="grid" id="grid"></div>
    </div>

    <!-- Tooltip -->
    <div class="tip" id="tip" hidden></div>

    <script src="script.js"></script>
  </body>
</html>
